<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Masters of Sight</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Serif+Display:ital@0;1&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --bg-2: #161616;
    --bg-3: #1e1e1e;
    --text: #f0ece4;
    --text-muted: #7a7570;
    --text-dim: #4a4642;
    --accent: #c8a96e;
    --accent-dim: #7a6540;
    --border: rgba(255,255,255,0.06);
    --border-hover: rgba(255,255,255,0.14);
    --tag-bg: rgba(200,169,110,0.12);
    --tag-text: #c8a96e;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    line-height: 1.6;
    min-height: 100vh;
    cursor: default;
  }

  /* ── NAV ── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 48px;
    height: 64px;
    background: rgba(15,15,15,0.85);
    backdrop-filter: blur(12px);
    border-bottom: 0.5px solid var(--border);
  }

  .nav-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 0.12em;
    color: var(--text);
    text-decoration: none;
  }

  .nav-logo span { color: var(--accent); }

  .nav-tagline {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  /* ── VIEWS ── */
  #view-gallery, #view-profile {
    transition: opacity 0.3s ease;
  }

  #view-profile { display: none; }

  /* ── HERO ── */
  .hero {
    padding: 140px 48px 64px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .hero-eyebrow {
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 20px;
  }

  .hero-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(63px, 9.8vw, 140px);
    line-height: 0.78;
    letter-spacing: 0.03em;
    color: var(--text);
    margin-bottom: 28px;
  }

  .hero-title em {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-weight: 700;
  color: var(--accent);
  }
  .hero-title-sight {
  color: #ffffff;
  }

  .hero-sub {
    max-width: 480px;
    font-size: 14.25px;
    color: var(--text-muted);
    line-height: 1.75;
  }

  /* ── FILTER BAR ── */
  .filter-bar {
    padding: 0 48px 40px;
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .filter-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
    background: transparent;
    border: 0.5px solid var(--border-hover);
    border-radius: 2px;
    padding: 7px 16px;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .filter-btn:hover, .filter-btn.active {
    color: var(--accent);
    border-color: var(--accent-dim);
    background: var(--tag-bg);
  }

  /* ── GRID ── */
  .grid {
    padding: 0 48px 120px;
    max-width: 1400px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 2px;
  }

  @media (max-width: 1100px) { .grid { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 800px) { .grid { grid-template-columns: repeat(2, 1fr); } }

  .card {
    position: relative;
    aspect-ratio: 3/4;
    overflow: hidden;
    cursor: pointer;
    background: var(--bg-3);
  }

  .card-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94), filter 0.4s ease;
    filter: grayscale(30%) brightness(0.85);
  }

  .card:hover .card-img {
    transform: scale(1.05);
    filter: grayscale(0%) brightness(0.95);
  }

  .card-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.2) 50%, transparent 100%);
    opacity: 0.8;
    transition: opacity 0.3s ease;
  }

  .card:hover .card-overlay { opacity: 1; }

  .card-info {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 24px 20px 20px;
  }

  .card-discipline {
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 6px;
  }

  .card-name {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    line-height: 1.1;
    color: var(--text);
  }

  .card-arrow {
    position: absolute;
    top: 18px; right: 18px;
    width: 36px; height: 36px;
    border: 0.5px solid rgba(255,255,255,0.25);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.3s ease, transform 0.3s ease;
    font-size: 14px;
    color: var(--text);
  }

  .card:hover .card-arrow {
    opacity: 1;
    transform: translateY(0);
  }

  .card-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg-3);
  }

  .card-placeholder-initials {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 56px;
    letter-spacing: 0.08em;
    color: var(--text-dim);
  }

  /* ── PROFILE VIEW ── */
  .profile-hero {
    position: relative;
    height: 70vh;
    min-height: 500px;
    overflow: hidden;
  }

  .profile-hero-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: brightness(0.6);
  }

  .profile-hero-gradient {
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, rgba(15,15,15,0.2) 0%, rgba(15,15,15,0.5) 60%, var(--bg) 100%);
  }

  .profile-hero-content {
    position: absolute;
    bottom: 60px; left: 64px; right: 64px;
  }

  .profile-back {
    position: absolute;
    top: 84px; left: 48px;
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.6);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    transition: color 0.2s;
    z-index: 10;
  }

  .profile-back:hover { color: var(--accent); }

  .profile-eyebrow {
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 14px;
  }

  .profile-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(56px, 8vw, 110px);
    line-height: 0.9;
    letter-spacing: 0.03em;
    color: var(--text);
  }

  .profile-tags {
    display: flex;
    gap: 8px;
    margin-top: 20px;
    flex-wrap: wrap;
  }

  .tag {
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--tag-text);
    background: var(--tag-bg);
    border: 0.5px solid var(--accent-dim);
    border-radius: 2px;
    padding: 5px 12px;
  }

  /* ── PROFILE BODY ── */
  .profile-body {
    max-width: 1200px;
    margin: 0 auto;
    padding: 80px 64px 120px;
    display: grid;
    grid-template-columns: 1fr 360px;
    gap: 80px;
    align-items: start;
  }

  @media (max-width: 900px) {
    .profile-body { grid-template-columns: 1fr; padding: 48px 32px 80px; }
  }

  .profile-bio {
    font-size: 18px;
    line-height: 1.8;
    color: var(--text);
    font-weight: 300;
    margin-bottom: 64px;
  }

  .profile-section {
    margin-bottom: 52px;
  }

  .profile-section-label {
    font-size: 9px;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 24px;
    padding-bottom: 12px;
    border-bottom: 0.5px solid var(--border);
  }

  .profile-traits {
    list-style: none;
  }

  .profile-traits li {
    font-size: 15px;
    color: var(--text-muted);
    padding: 10px 0;
    border-bottom: 0.5px solid var(--border);
    line-height: 1.5;
  }

  .profile-traits li:last-child { border-bottom: none; }

  .profile-philosophy {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    line-height: 1.65;
    color: var(--text);
    font-style: italic;
    padding: 24px 28px;
    border-left: 2px solid var(--accent);
    background: rgba(200,169,110,0.05);
  }

  .profile-works {
    list-style: none;
  }

  .profile-works li {
    padding: 18px 0;
    border-bottom: 0.5px solid var(--border);
  }

  .profile-works li:last-child { border-bottom: none; }

  .work-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 5px;
    letter-spacing: 0.02em;
  }

  .work-desc {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.6;
  }

  /* ── SIDEBAR ── */
  .profile-sidebar {}

  .profile-gallery {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 3px;
    margin-bottom: 48px;
  }

  .profile-gallery img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    filter: brightness(0.85);
    transition: filter 0.3s, transform 0.4s;
  }

  .profile-gallery img:hover {
    filter: brightness(1);
    transform: scale(1.02);
    z-index: 1;
    position: relative;
  }

  .profile-gallery img:first-child {
    grid-column: span 2;
    aspect-ratio: 16/9;
  }

  .sidebar-meta {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .meta-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding-bottom: 16px;
    border-bottom: 0.5px solid var(--border);
    font-size: 13px;
  }

  .meta-label {
    color: var(--text-muted);
    letter-spacing: 0.05em;
  }

  .meta-value {
    color: var(--text);
    font-weight: 400;
    text-align: right;
  }

  .meta-link {
    color: var(--accent);
    text-decoration: none;
    font-size: 12px;
    letter-spacing: 0.05em;
  }

  .meta-link:hover { text-decoration: underline; }

  /* ── PLACEHOLDER HERO ── */
  .profile-hero-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg-3);
  }

  .profile-hero-placeholder-initials {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 120px;
    letter-spacing: 0.08em;
    color: var(--text-dim);
  }

  /* ── FOOTER ── */
  footer {
    border-top: 0.5px solid var(--border);
    padding: 32px 48px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    max-width: 100%;
  }

  .footer-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 0.12em;
    color: var(--text-dim);
  }

  .footer-copy {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card {
    animation: fadeUp 0.5s ease both;
  }

  .card:nth-child(1) { animation-delay: 0.05s; }
  .card:nth-child(2) { animation-delay: 0.1s; }
  .card:nth-child(3) { animation-delay: 0.15s; }
  .card:nth-child(4) { animation-delay: 0.2s; }
  .card:nth-child(5) { animation-delay: 0.25s; }
  .card:nth-child(6) { animation-delay: 0.3s; }
  .card:nth-child(7) { animation-delay: 0.35s; }
  .card:nth-child(8) { animation-delay: 0.4s; }

  /* ── LIGHTBOX ── */
  .lightbox {
    position: fixed;
    inset: 0;
    z-index: 1000;
    background: rgba(0,0,0,0.95);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
    cursor: zoom-out;
  }

  .lightbox.active {
    opacity: 1;
    pointer-events: all;
  }

  .lightbox-img {
    max-width: 90vw;
    max-height: 90vh;
    object-fit: contain;
    border-radius: 2px;
    transform: scale(0.96);
    transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    box-shadow: 0 32px 80px rgba(0,0,0,0.6);
  }

  .lightbox.active .lightbox-img {
    transform: scale(1);
  }

  .lightbox-close {
    position: absolute;
    top: 24px;
    right: 28px;
    font-size: 28px;
    color: rgba(255,255,255,0.5);
    cursor: pointer;
    transition: color 0.2s;
    line-height: 1;
    background: none;
    border: none;
    padding: 8px;
  }

  .lightbox-close:hover { color: var(--text); }

  .lightbox-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(255,255,255,0.08);
    border: 0.5px solid rgba(255,255,255,0.12);
    border-radius: 50%;
    color: rgba(255,255,255,0.6);
    cursor: pointer;
    font-size: 20px;
    width: 48px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .lightbox-nav:hover {
    background: rgba(255,255,255,0.16);
    color: var(--text);
  }

  .lightbox-prev { left: 24px; }
  .lightbox-next { right: 24px; }

  .lightbox-counter {
    position: absolute;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    letter-spacing: 0.16em;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
  }

  .profile-gallery img { cursor: zoom-in; }
</style>
</head>
<body>

<!-- ── LIGHTBOX ── -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <button class="lightbox-close" onclick="closeLightbox()">&#215;</button>
  <button class="lightbox-nav lightbox-prev" onclick="lightboxNav(-1); event.stopPropagation()">&#8249;</button>
  <img class="lightbox-img" id="lightbox-img" src="" alt="">
  <button class="lightbox-nav lightbox-next" onclick="lightboxNav(1); event.stopPropagation()">&#8250;</button>
  <span class="lightbox-counter" id="lightbox-counter"></span>
</div>

<nav>
  <a class="nav-logo" href="#" onclick="showGallery(); return false;">Masters <em style="font-family:'Playfair Display',serif; font-style:italic; font-weight:700; color:var(--accent)">of</em> Sight</a>
</nav>

<!-- ═══════════════════════════════════════════ GALLERY VIEW -->
<div id="view-gallery">

  <div class="hero">
    <p class="hero-eyebrow">A creative lineage</p>
    <h1 class="hero-title">Masters<br><em>of</em> <span class="hero-title-sight">Sight</span></h1>
    <p class="hero-sub">The photographers, directors, and image-makers who rewired our retinas.</p>
  </div>

  <div class="filter-bar">
    <button class="filter-btn active" onclick="filterCards('all', this)">All</button>
    <button class="filter-btn" onclick="filterCards('Photographer', this)">Photographer</button>
    <button class="filter-btn" onclick="filterCards('Director', this)">Director</button>
    <button class="filter-btn" onclick="filterCards('Designer', this)">Designer</button>
    <button class="filter-btn" onclick="filterCards('Commercial', this)">Commercial</button>
    <button class="filter-btn" onclick="filterCards('Interactive', this)">Interactive</button>
  </div>

  <div class="grid" id="card-grid"></div>

  <footer>
    <span class="footer-logo">Masters of Sight</span>
    <span class="footer-copy">A personal archive of visual influence</span>
  </footer>

</div>

<!-- ═══════════════════════════════════════════ PROFILE VIEW -->
<div id="view-profile">
  <a class="profile-back" onclick="showGallery(); return false;">
    ← Back
  </a>

  <div class="profile-hero">
    <img class="profile-hero-img" id="p-hero-img" src="" alt="">
    <div class="profile-hero-gradient"></div>
    <div class="profile-hero-content">
      <p class="profile-eyebrow" id="p-discipline"></p>
      <h1 class="profile-name" id="p-name"></h1>
      <div class="profile-tags" id="p-tags"></div>
    </div>
  </div>

  <div class="profile-body">
    <div class="profile-main">
      <p class="profile-bio" id="p-bio"></p>

      <div class="profile-section">
        <p class="profile-section-label">Signature Traits</p>
        <ul class="profile-traits" id="p-traits"></ul>
      </div>

      <div class="profile-section">
        <p class="profile-section-label">Philosophy</p>
        <blockquote class="profile-philosophy" id="p-philosophy"></blockquote>
      </div>

      <div class="profile-section">
        <p class="profile-section-label">Major Works</p>
        <ul class="profile-works" id="p-works"></ul>
      </div>
    </div>

    <div class="profile-sidebar">
      <div class="profile-gallery" id="p-gallery"></div>
      <div class="sidebar-meta" id="p-meta"></div>
    </div>
  </div>

</div>

PEOPLE.sort((a, b) => {
  const lastName = name => name.trim().split(' ').slice(-1)[0];
  return lastName(a.name).localeCompare(lastName(b.name));
});

function getInitials(name) {
  return name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
}

function buildCard(person) {
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.discipline = person.discipline;
  card.onclick = () => showProfile(person.id);

  const hasImage = person.coverImage && person.coverImage.trim() !== '';

  card.innerHTML = `
    ${hasImage
      ? `<img class="card-img" src="${person.coverImage}" alt="${person.name}" loading="lazy" onerror="this.style.display='none'; this.nextElementSibling.style.display='none'; this.parentElement.querySelector('.card-placeholder').style.display='flex';">
         <div class="card-overlay"></div>`
      : `<div class="card-overlay" style="display:none;"></div>`
    }
    <div class="card-placeholder" style="display:${hasImage ? 'none' : 'flex'}; position:absolute; inset:0;">
      <span class="card-placeholder-initials">${getInitials(person.name)}</span>
    </div>
    <div class="card-info">
      <p class="card-discipline">${person.discipline}</p>
      <p class="card-name">${person.name}</p>
    </div>
    <div class="card-arrow">↗</div>
  `;
  return card;
}

function buildGallery(people) {
  const grid = document.getElementById('card-grid');
  grid.innerHTML = '';
  people.forEach(person => grid.appendChild(buildCard(person)));
}

function filterCards(discipline, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const filtered = discipline === 'all' ? PEOPLE : PEOPLE.filter(p => p.discipline === discipline);
  buildGallery(filtered);
}

function showProfile(id) {
  const person = PEOPLE.find(p => p.id === id);
  if (!person) return;

  const heroImg = document.getElementById('p-hero-img');
  const hasHeroImage = (person.heroImage || person.coverImage || '').trim() !== '';

  if (hasHeroImage) {
    heroImg.src = person.heroImage || person.coverImage;
    heroImg.style.display = 'block';
  } else {
    heroImg.src = '';
    heroImg.style.display = 'none';
  }
  heroImg.alt = person.name;

  document.getElementById('p-discipline').textContent = person.discipline;
  document.getElementById('p-name').textContent = person.name;

  const tags = document.getElementById('p-tags');
  tags.innerHTML = [person.style, person.nationality, person.born + ' \u2013'].map(t => `<span class="tag">${t}</span>`).join('');

  document.getElementById('p-bio').textContent = person.bio;

  const traits = document.getElementById('p-traits');
  traits.innerHTML = person.traits.map(t => `<li>${t}</li>`).join('');

  document.getElementById('p-philosophy').textContent = person.philosophy;

  const works = document.getElementById('p-works');
  works.innerHTML = person.works.map(w => `
    <li>
      <p class="work-title">${w.title}</p>
      <p class="work-desc">${w.desc}</p>
    </li>
  `).join('');

  const gallery = document.getElementById('p-gallery');
  const imgs = (person.galleryImages || []).filter(src => src && src.trim() !== '');
  if (imgs.length > 0) {
    gallery.innerHTML = imgs.map((src, i) =>
      `<img src="${src}" alt="${person.name} work ${i+1}" loading="lazy" onclick="openLightbox(${i})" data-index="${i}">`
    ).join('');
    gallery.style.display = 'grid';
  } else {
    gallery.innerHTML = '';
    gallery.style.display = 'none';
  }
  window._lightboxImages = imgs;

  const meta = document.getElementById('p-meta');
  meta.innerHTML = `
    <div class="meta-row"><span class="meta-label">Discipline</span><span class="meta-value">${person.discipline}</span></div>
    <div class="meta-row"><span class="meta-label">Style</span><span class="meta-value">${person.style}</span></div>
    <div class="meta-row"><span class="meta-label">Born</span><span class="meta-value">${person.born}</span></div>
    <div class="meta-row"><span class="meta-label">Nationality</span><span class="meta-value">${person.nationality}</span></div>
    ${person.url ? `<div class="meta-row"><span class="meta-label">Learn more</span><a class="meta-link" href="${person.url}" target="_blank">View profile \u2192</a></div>` : ''}
  `;

  document.getElementById('view-gallery').style.display = 'none';
  document.getElementById('view-profile').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showGallery() {
  document.getElementById('view-profile').style.display = 'none';
  document.getElementById('view-gallery').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── LIGHTBOX ──
let _lbIndex = 0;

function openLightbox(index) {
  const images = window._lightboxImages || [];
  if (!images.length) return;
  _lbIndex = index;
  updateLightbox();
  document.getElementById('lightbox').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function updateLightbox() {
  const images = window._lightboxImages || [];
  const img = document.getElementById('lightbox-img');
  img.src = images[_lbIndex];
  img.style.transform = 'scale(0.96)';
  setTimeout(() => img.style.transform = '', 10);
  document.getElementById('lightbox-counter').textContent = `${_lbIndex + 1} / ${images.length}`;
  document.querySelector('.lightbox-prev').style.opacity = images.length > 1 ? '1' : '0';
  document.querySelector('.lightbox-next').style.opacity = images.length > 1 ? '1' : '0';
}

function lightboxNav(dir) {
  const images = window._lightboxImages || [];
  _lbIndex = (_lbIndex + dir + images.length) % images.length;
  updateLightbox();
}

function closeLightbox(e) {
  if (e && e.target !== e.currentTarget && !e.target.classList.contains('lightbox-close')) return;
  document.getElementById('lightbox').classList.remove('active');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => {
  const lb = document.getElementById('lightbox');
  if (!lb.classList.contains('active')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') lightboxNav(-1);
  if (e.key === 'ArrowRight') lightboxNav(1);
});

buildGallery(PEOPLE);
